<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none" style="width: 320px;" x-data>
  <template x-for="toast in $store.toasts.list" :key="toast.id">
    <div x-show="toast.visible"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="-translate-y-4 opacity-0"
         x-transition:enter-end="translate-y-0 opacity-100"
         x-transition:leave="transition ease-in duration-200 transform"
         x-transition:leave-start="translate-y-0 opacity-100"
         x-transition:leave-end="-translate-y-4 opacity-0"
         class="pointer-events-auto rounded-xl shadow-lg flex items-start gap-3 p-4 border"
         :style="toastStyle(toast.type)">
      
      <!-- Icon -->
      <div class="shrink-0 mt-0.5">
        <template x-if="toast.type === 'success'">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
        </template>
        <template x-if="toast.type === 'error'">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
        </template>
        <template x-if="toast.type === 'warning'">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        </template>
        <template x-if="toast.type === 'info'">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </template>
      </div>

      <!-- Message -->
      <p class="text-sm font-bold flex-1" x-text="toast.message"></p>

      <!-- Close -->
      <button @click="$store.toasts.dismiss(toast.id)" class="opacity-60 hover:opacity-100 transition-opacity">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </template>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('toasts', {
      list: [],
      addToast(message, type = 'info') {
        const id = Date.now();
        const duration = type === 'error' ? 6000 : 4000;
        
        const toast = { id, message, type, visible: true };
        this.list.push(toast);
        
        setTimeout(() => this.dismiss(id), duration);
      },
      dismiss(id) {
        const toast = this.list.find(t => t.id === id);
        if (toast) {
          toast.visible = false;
          setTimeout(() => {
            this.list = this.list.filter(t => t.id !== id);
          }, 200);
        }
      }
    });

    window.toastStyle = function(type) {
      if (type === 'success') return 'background-color: white; color: var(--echo-success); border-color: rgba(16, 185, 129, 0.2);';
      if (type === 'error') return 'background-color: white; color: var(--echo-error); border-color: rgba(239, 68, 68, 0.2);';
      if (type === 'warning') return 'background-color: white; color: var(--echo-amber); border-color: rgba(245, 158, 11, 0.2);';
      return 'background-color: white; color: var(--echo-deep); border-color: var(--echo-border);';
    };
  });

  // HTMX error handling
  document.addEventListener('htmx:responseError', (e) => {
    const status = e.detail.xhr.status;
    if (status === 413) Alpine.store('toasts').addToast('File too large — max 1 GB', 'error');
    else if (status === 415) Alpine.store('toasts').addToast('Unsupported format', 'error');
    else if (status >= 500) Alpine.store('toasts').addToast('Server error — please retry', 'error');
    else Alpine.store('toasts').addToast('An error occurred: ' + status, 'error');
  });
</script>
