<main id="main-content" class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" role="main">
  <div class="echo-card p-8 max-w-2xl mx-auto mt-12 text-center animate-slide-in">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-6" style="background-color: var(--echo-accent-soft);">
        <svg class="animate-spin w-8 h-8" style="color: var(--echo-accent);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>
    
    <h2 class="text-2xl font-bold tracking-tight mb-2" style="color: var(--echo-deep);">Processing File</h2>
    <p class="text-sm mb-8 truncate" style="color: var(--echo-muted);">{{ session.original_filename }}</p>
    
    <div class="w-full rounded-full h-2 mb-4 overflow-hidden" style="background-color: var(--echo-border);">
        <!-- Indeterminate progress bar using accent color -->
        <div class="h-full w-full rounded-full" style="background-color: var(--echo-accent); animation: progress 2s infinite ease-in-out;"></div>
    </div>
    
    <div class="flex justify-between items-center text-xs font-mono font-medium" style="color: var(--echo-deep);">
        <span style="color: var(--echo-muted);">SESSION ID</span>
        <span class="uppercase tracking-wide animate-pulse">{{ session.status }}</span>
    </div>
  </div>
</main>
