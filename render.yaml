services:
  - type: web
    name: echo-web
    env: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: echo-redis
          property: connectionString
      - key: TRANSCRIPTION_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false   # set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard
    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 10

  - type: pserv
    name: echo-db
    env: postgres
    plan: free

  - type: redis
    name: echo-redis
    plan: free
