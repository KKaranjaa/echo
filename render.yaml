services:
  - type: web
    name: echo-web
    env: docker
    plan: free
    dockerCommand: "celery -A echo worker --loglevel=info --concurrency=1 & celery -A echo beat --loglevel=info & gunicorn echo.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: echo-redis
          property: connectionString
      - key: TRANSCRIPTION_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 10



  - type: redis
    name: echo-redis
    plan: free
    ipAllowList: []

databases:
  - name: echo-db
    plan: free
