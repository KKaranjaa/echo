services:
  - type: web
    name: echo-web
    env: docker
    plan: free
    dockerCommand: "bash start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: echo-redis
          property: connectionString
      - key: TRANSCRIPTION_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false




  - type: redis
    name: echo-redis
    plan: free
    ipAllowList: []

databases:
  - name: echo-db
    plan: free
