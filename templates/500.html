{% extends "base.html" %}

{% block title %}Server Error - ECHO{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-12rem)]">
  <div class="echo-card p-10 text-center max-w-md w-full">
    <div class="mx-auto w-16 h-16 rounded-2xl flex items-center justify-center mb-6"
         style="background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.05)); border: 1px solid rgba(245,158,11,0.2);">
      <svg class="w-8 h-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    
    <h1 class="text-2xl font-bold mb-3" style="color: var(--echo-deep);">Something went wrong</h1>
    <p class="text-sm mb-8" style="color: var(--echo-muted);">
      We experienced an internal server error while processing your request. Please try again or return to the dashboard.
    </p>

    <div class="flex flex-col gap-3">
      <a href="{% url 'dashboard:index' %}" 
         class="inline-block px-8 py-3 rounded-xl text-sm font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition-transform"
         style="background: var(--echo-accent); color: white;">
        Return to Dashboard
      </a>
      <button onclick="window.location.reload()" 
         class="inline-block px-8 py-3 rounded-xl text-sm font-bold border hover:bg-[color:var(--echo-surface)] transition-colors">
        Try Again
      </button>
    </div>
  </div>
</div>
{% endblock %}
