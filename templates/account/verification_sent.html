{% extends "base.html" %}

{% block title %}Verify Email{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto mt-10">
  <div class="echo-card p-6 text-center animate-slide-in">
    <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
         style="background: var(--echo-accent-soft); color: var(--echo-accent);">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
    </div>
    
    <h2 class="text-2xl font-bold mb-2" style="color: var(--echo-deep);">Check your inbox</h2>
    <p class="text-sm font-medium mb-6" style="color: var(--echo-muted);">
      We've sent a verification link and a verification code to your email.
    </p>

    <!-- PWA users who want to paste the code right away -->
    <div class="text-left mt-6 pt-6 border-t" style="border-color: var(--echo-border);">
      <h3 class="text-sm font-bold mb-1" style="color: var(--echo-deep);">Can't click the link?</h3>
      <p class="text-xs mb-3" style="color: var(--echo-muted);">Paste the verification code here:</p>
      
      <form class="flex gap-2" method="POST" action="{% url 'confirm_email_manual' %}">
        {% csrf_token %}
        <input type="text" name="key" placeholder="Code (e.g. xyz789...)" required
               class="flex-1 px-4 py-2 text-sm rounded-lg border focus:outline-none focus:ring-2 font-mono"
               style="background: var(--liquid-bg); border-color: var(--liquid-border); color: var(--echo-deep); --tw-ring-color: var(--echo-accent);">
        
        <button type="submit"
                class="px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:scale-[1.02] transition-transform"
                style="background: var(--echo-accent); color: #1a0a2e;">
          Verify
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
