{% extends "base.html" %}

{% block title %}Sign Out - ECHO{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-12rem)]">
  <div class="echo-card p-8 w-full max-w-sm text-center flex flex-col gap-6">
    
    <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center"
         style="background: rgba(239, 68, 68, 0.12);">
      <svg class="w-8 h-8" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
      </svg>
    </div>

    <div>
      <h2 class="text-2xl font-bold" style="color: var(--echo-deep);">Sign Out</h2>
      <p class="text-sm mt-2" style="color: var(--echo-muted);">Are you sure you want to sign out?</p>
    </div>

    <form method="POST" action="{% url 'account_logout' %}" class="flex flex-col gap-3">
      {% csrf_token %}
      {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
      {% endif %}
      
      <button type="submit"
              class="w-full py-3 rounded-xl text-sm font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition-transform"
              style="background: #ef4444; color: white;">
        Yes, Sign Out
      </button>
      
      <a href="{% url 'dashboard:index' %}"
         class="w-full py-3 rounded-xl text-sm font-bold text-center border-2 hover:bg-white/5 transition-colors"
         style="border-color: var(--echo-border); color: var(--echo-deep);">
        No, Return to Dashboard
      </a>
    </form>
  </div>
</div>
{% endblock %}
