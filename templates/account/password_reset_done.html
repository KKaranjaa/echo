{% extends "base.html" %}

{% block title %}Check Your Email - ECHO{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-12rem)]">
  <div class="echo-card p-8 w-full max-w-md text-center flex flex-col gap-6">
    
    <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center"
         style="background: rgba(16, 185, 129, 0.12);">
      <svg class="w-8 h-8" fill="none" stroke="#10B981" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>

    <div>
      <h2 class="text-2xl font-bold" style="color: var(--echo-deep);">Check Your Email</h2>
      <p class="text-sm mt-2" style="color: var(--echo-muted);">
        We've sent a password reset link to your email. Check your inbox (and spam folder!) and follow the instructions.
      </p>
    </div>

    <a href="{% url 'account_login' %}"
       class="w-full py-3 rounded-xl text-sm font-bold text-center shadow-lg hover:scale-[1.02] active:scale-95 transition-transform"
       style="background: var(--echo-accent); color: white;">
      Back to Log In
    </a>
  </div>
</div>
{% endblock %}
